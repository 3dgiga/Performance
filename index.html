<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Performance Auto Center</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bgDark:#2d0f0f;
      --bgPrimary:#4a1c1c;
      --bgSecondary:#5c2020;
      --bgLight:#6b2525;

      --gold:#ffd700;
      --goldLight:#ffb347;
      --orange:#ff8c00;
      --orangeRed:#ff4500;
      --red:#dc143c;
      --redDark:#8b0000;

      --silver:#c0c0c0;
      --silverLight:#e8e8e8;
      --silverDark:#8a8a8a;
      --steel:#b8b8b8;
      --steelDark:#7a7a7a;

      --text:#ffffff;
      --textMuted:#d4af37;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      min-height:100%;
    }

    body{
      font-family:'Montserrat',sans-serif;
      min-height:100dvh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:16px;
      overflow:auto;
      color:#fff;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,140,0,.15), transparent 40%),
        radial-gradient(circle at 70% 50%, rgba(220,20,60,.1), transparent 35%),
        linear-gradient(180deg, var(--bgSecondary) 0%, var(--bgPrimary) 50%, var(--bgDark) 100%);
      background-attachment:fixed;
      -webkit-overflow-scrolling:touch;
    }

    .screen{
      width:min(390px, 100%);
      min-height:calc(100dvh - 32px);
      max-height:calc(100dvh - 32px);
      border-radius:44px;
      overflow-y:auto;
      overflow-x:hidden;
      position:relative;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,215,0,.08), transparent 35%),
        linear-gradient(180deg, var(--bgSecondary) 0%, var(--bgPrimary) 60%, var(--bgDark) 100%);
      box-shadow:
        0 30px 80px rgba(0,0,0,.8),
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 0 0 60px rgba(0,0,0,.5);
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:32px 20px calc(20px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      scrollbar-width:thin;
      touch-action:pan-y;
    }

    .screen::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:200px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,179,71,.15), transparent 50%);
      pointer-events:none;
    }

    .screen::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.02) 0 1px,
          transparent 1px 3px
        );
      pointer-events:none;
      opacity:0.5;
    }

    .hero{
      width:100%;
      text-align:center;
      position:relative;
      z-index:1;
      margin-bottom:24px;
      flex-shrink:0;
    }

    .logo-container{
      width:min(300px, 90%);
      margin:0 auto 20px;
      position:relative;
    }

    .logo{
      width:100%;
      height:auto;
      display:block;
      filter:
        drop-shadow(0 8px 20px rgba(0,0,0,.8))
        drop-shadow(0 0 30px rgba(255,140,0,.2));
      border-radius:16px;
    }

    .logo-text{
      font-size:clamp(1.5rem, 4.5vw, 2rem);
      font-weight:900;
      letter-spacing:3px;
      background:linear-gradient(180deg, #ffffff 0%, var(--silver) 50%, var(--silverDark) 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-shadow:
        0 2px 8px rgba(0,0,0,.8),
        0 0 20px rgba(255,215,0,.1);
      margin-bottom:10px;
      line-height:1.1;
      text-transform:uppercase;
    }

    .tagline{
      font-size:clamp(0.75rem, 2.2vw, 0.85rem);
      font-weight:700;
      line-height:1.4;
      letter-spacing:2px;
      background:linear-gradient(90deg, var(--goldLight), var(--gold), var(--orange));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      text-transform:uppercase;
      text-shadow:0 2px 4px rgba(0,0,0,.6);
    }

    .actions{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;
      z-index:1;
      flex:0 0 auto;
    }

    .action-wrapper{
      border-radius:18px;
      padding:2px;
      background:linear-gradient(180deg, #ffffff 0%, #c0c0c0 25%, #8a8a8a 50%, #b8b8b8 75%, #ffffff 100%);
      transition:all .3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .action-wrapper:hover{
      background:linear-gradient(180deg, #ffffff 0%, var(--goldLight) 25%, var(--silver) 50%, var(--goldLight) 75%, #ffffff 100%);
    }

    .action{
      display:flex;
      align-items:center;
      gap:14px;
      width:100%;
      min-height:72px;
      padding:12px 16px;
      text-decoration:none;
      color:var(--silverLight);
      text-transform:uppercase;
      font-weight:800;
      letter-spacing:1px;
      line-height:1.2;
      border-radius:16px;
      background:
        linear-gradient(180deg, rgba(91,28,28,.95) 0%, rgba(74,28,28,.98) 100%);
      border:none;
      box-shadow:
        0 8px 24px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.2),
        inset 0 -1px 0 rgba(0,0,0,.5);
      transition:all .3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position:relative;
      overflow:hidden;
      flex-shrink:0;
    }

    .action::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,215,0,.1) 0%, transparent 50%);
      opacity:0.6;
      pointer-events:none;
    }

    .action::after{
      content:'';
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,215,0,.15), transparent);
      transition:left .6s;
    }

    .action:hover::after{
      left:100%;
    }

    .action-wrapper:hover .action{
      box-shadow:
        0 12px 32px rgba(0,0,0,.7),
        inset 0 1px 0 rgba(255,255,255,.3),
        0 0 25px rgba(255,140,0,.3);
    }

    .action-wrapper:hover{
      transform:translateY(-3px) scale(1.02);
    }

    .action-wrapper:active{
      transform:translateY(-1px) scale(0.98);
    }

    .action-wrapper:active .action{
      box-shadow:
        0 4px 16px rgba(0,0,0,.6),
        inset 0 2px 4px rgba(0,0,0,.5);
    }

    .icon{
      width:50px;
      height:50px;
      flex:0 0 50px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:24px;
      color:#fff;
      box-shadow:
        inset 0 2px 6px rgba(255,255,255,.3),
        inset 0 -2px 6px rgba(0,0,0,.4),
        0 4px 12px rgba(0,0,0,.5);
      text-shadow:0 2px 4px rgba(0,0,0,.7);
      position:relative;
      z-index:1;
      border:2px solid rgba(255,255,255,.3);
    }

    .icon.whatsapp{
      background:linear-gradient(135deg, #25D366 0%, #128C7E 100%);
    }

    .icon.instagram{
      background:linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    .icon.location{
      background:linear-gradient(135deg, var(--orange) 0%, var(--red) 100%);
    }

    .icon.phone{
      background:linear-gradient(135deg, var(--red) 0%, var(--redDark) 100%);
    }

    .icon.google-review{
      background:linear-gradient(135deg, #4285F4 0%, #34A853 50%, #FBBC05 75%, #EA4335 100%);
    }

    .label{
      flex:1;
      text-align:center;
      font-size:clamp(0.85rem, 2.2vw, 0.95rem);
      text-shadow:0 2px 4px rgba(0,0,0,.7);
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .label span{
      display:block;
    }

    .label-small{
      font-size:0.85em;
      opacity:0.85;
      font-weight:700;
      color:var(--goldLight);
    }

    footer{
      margin-top:20px;
      padding:20px 18px calc(24px + env(safe-area-inset-bottom));
      position:relative;
      z-index:1;
      text-align:center;
      font-size:12px;
      font-weight:600;
      letter-spacing:1px;
      background:linear-gradient(90deg, var(--gold), var(--orange), var(--gold));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      width:100%;
      border-top:1px solid rgba(255,215,0,.2);
      text-shadow:0 0 20px rgba(255,215,0,.1);
      flex-shrink:0;
    }

    @media (max-width: 420px){
      body{
        padding:10px;
        background-attachment:scroll;
      }

      .screen{
        width:100%;
        min-height:calc(100dvh - 20px);
        max-height:calc(100dvh - 20px);
        border-radius:30px;
        padding:24px 14px calc(18px + env(safe-area-inset-bottom));
      }

      .action{
        min-height:68px;
        padding:10px 14px;
      }

      .icon{
        width:46px;
        height:46px;
        flex-basis:46px;
        font-size:22px;
      }

      .label{
        font-size:0.82rem;
      }

      .logo-text{
        letter-spacing:2px;
      }

      .tagline{
        letter-spacing:1.2px;
      }
    }
  </style>
</head>

</body>
