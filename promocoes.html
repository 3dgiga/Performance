  <script type="module">
    // Importar configurações do Firebase (arquivo local)
    import { auth, db, storage, signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, ref, uploadBytes, getDownloadURL, deleteObject } from './firebase-config.js';

    // === ELEMENTOS DOM ===
    const gallery = document.getElementById('gallery');
    const toggleAdmin = document.getElementById('toggleAdmin');
    const adminPanel = document.getElementById('adminPanel');
    const loginForm = document.getElementById('loginForm');
    const uploadForm = document.getElementById('uploadForm');
    const btnLogout = document.getElementById('btnLogout');
    const adminStatus = document.getElementById('adminStatus');
    const loginMessage = document.getElementById('loginMessage');
    const uploadMessage = document.getElementById('uploadMessage');
    const imageModal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    const modalClose = document.getElementById('modalClose');

    let isAdmin = false;
    let unsubscribeGallery = null;

    // === INICIALIZAÇÃO ===
    document.addEventListener('DOMContentLoaded', () => {
      // Observar estado de autenticação
      onAuthStateChanged(auth, (user) => {
        isAdmin = !!user;
        updateAdminUI();
        if (isAdmin) showUploadForm();
      });

      // Carregar galeria em tempo real
      loadGalleryRealtime();

      // Toggle do painel admin
      toggleAdmin.addEventListener('click', () => {
        adminPanel.classList.toggle('active');
      });
    });

    // === CARREGAR GALERIA (REAL-TIME) ===
    function loadGalleryRealtime() {
      const q = query(collection(db, 'promocoes'), orderBy('createdAt', 'desc'));
      
      unsubscribeGallery = onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          gallery.innerHTML = `
            <div class="gallery-empty">
              <i class="fas fa-gift"></i>
              <div>Nenhuma promoção ativa no momento.</div>
              <div style="font-size:0.8rem; opacity:.7;">Volte em breve para conferir ofertas exclusivas!</div>
            </div>
          `;
          return;
        }

        gallery.innerHTML = snapshot.docs.map(docSnap => {
          const p = docSnap.data();
          return `
            <div class="gallery-item" onclick="window.openModal('${p.imageUrl}')">
              <img src="${p.imageUrl}" alt="${p.title || 'Promoção'}" loading="lazy">
              ${isAdmin ? `<button class="btn-delete" data-id="${docSnap.id}" onclick="window.deletePromo(event, '${docSnap.id}')"><i class="fas fa-trash"></i></button>` : ''}
            </div>
          `;
        }).join('');
      }, (error) => {
        console.error('Erro ao carregar promoções:', error);
        gallery.innerHTML = `<div class="gallery-empty"><i class="fas fa-exclamation-triangle"></i><div>Erro ao carregar promoções.</div></div>`;
      });
    }

    // === LOGIN ===
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMessage(loginMessage, 'Login realizado com sucesso! ✨', 'success');
        loginForm.reset();
      } catch (error) {
        console.error(error);
        let msg = 'Erro no login.';
        if (error.code === 'auth/invalid-credential') msg = 'Email ou senha incorretos.';
        if (error.code === 'auth/too-many-requests') msg = 'Muitas tentativas. Tente mais tarde.';
        showMessage(loginMessage, msg, 'error');
      }
    });

    // === LOGOUT ===
    btnLogout.addEventListener('click', async () => {
      try {
        await signOut(auth);
        uploadForm.style.display = 'none';
        loginForm.style.display = 'block';
        showMessage(loginMessage, 'Você saiu do painel.', 'success');
      } catch (error) {
        console.error(error);
      }
    });

    // === UPLOAD DE IMAGEM ===
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = document.getElementById('promoImage').files[0];
      const title = document.getElementById('promoTitle').value.trim() || 'Nova Promoção';
      const desc = document.getElementById('promoDesc').value.trim();

      if (!file) {
        showMessage(uploadMessage, 'Selecione uma imagem.', 'error');
        return;
      }

      // Validar tipo e tamanho
      if (!file.type.startsWith('image/')) {
        showMessage(uploadMessage, 'Apenas arquivos de imagem são permitidos.', 'error');
        return;
      }
      if (file.size > 2 * 1024 * 1024) { // 2MB
        showMessage(uploadMessage, 'Imagem muito grande. Máximo: 2MB.', 'error');
        return;
      }

      try {
        showMessage(uploadMessage, 'Enviando imagem...', 'success');
        
        // Upload para Firebase Storage
        const storageRef = ref(storage, `promocoes/${Date.now()}_${file.name}`);
        const snapshot = await uploadBytes(storageRef, file);
        const imageUrl = await getDownloadURL(snapshot.ref);

        // Salvar metadados no Firestore
        await addDoc(collection(db, 'promocoes'), {
          imageUrl,
          title,
          description: desc,
          createdAt: new Date(),
          active: true
        });

        showMessage(uploadMessage, 'Promoção publicada com sucesso! 🎉', 'success');
        uploadForm.reset();
        
      } catch (error) {
        console.error('Erro no upload:', error);
        showMessage(uploadMessage, 'Erro ao publicar. Tente novamente.', 'error');
      }
    });

    // === EXCLUIR PROMOÇÃO (Admin) ===
    window.deletePromo = async (event, id) => {
      event.stopPropagation();
      if (!confirm('Tem certeza que deseja excluir esta promoção?')) return;

      try {
        // Excluir do Storage primeiro
        const promoRef = doc(db, 'promocoes', id);
        const promoSnap = await promoRef.get();
        const imageUrl = promoSnap.data()?.imageUrl;
        
        if (imageUrl) {
          const imageRef = ref(storage, imageUrl);
          await deleteObject(imageRef).catch(() => {}); // Ignora se já foi deletado
        }
        
        // Excluir do Firestore
        await deleteDoc(promoRef);
        showMessage(uploadMessage, 'Promoção excluída.', 'success');
      } catch (error) {
        console.error(error);
        showMessage(uploadMessage, 'Erro ao excluir.', 'error');
      }
    };

    // === UTILITÁRIOS ===
    function updateAdminUI() {
      if (isAdmin) {
        toggleAdmin.innerHTML = '<i class="fas fa-unlock"></i> Painel Admin (Ativo)';
        btnLogout.style.display = 'flex';
        adminStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--gold)"></i>';
      } else {
        toggleAdmin.innerHTML = '<i class="fas fa-lock"></i> Área do Administrador';
        btnLogout.style.display = 'none';
        adminStatus.innerHTML = '';
      }
    }

    function showUploadForm() {
      loginForm.style.display = 'none';
      uploadForm.style.display = 'block';
    }

    function showMessage(el, text, type) {
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // === MODAL DE IMAGEM ===
    window.openModal = function(src) {
      modalImg.src = src;
      imageModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    modalClose.addEventListener('click', () => {
      imageModal.classList.remove('active');
      document.body.style.overflow = '';
    });

    imageModal.addEventListener('click', (e) => {
      if (e.target === imageModal) {
        imageModal.classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && imageModal.classList.contains('active')) {
        imageModal.classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    // Limpar listener ao sair da página
    window.addEventListener('beforeunload', () => {
      if (unsubscribeGallery) unsubscribeGallery();
    });
  </script>
