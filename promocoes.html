<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promoções - Performance Auto Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* --- ESTILO VISUAL --- */
    :root{ --bgDark:#2d0f0f; --bgPrimary:#4a1c1c; --bgSecondary:#5c2020; --bgLight:#6b2525; --gold:#ffd700; --goldLight:#ffb347; --orange:#ff8c00; --red:#dc143c; --silver:#c0c0c0; --silverLight:#e8e8e8; --silverDark:#8a8a8a; }
    *{margin:0;padding:0;box-sizing:border-box;} html,body{min-height:100%;}
    body{ font-family:'Montserrat',sans-serif; min-height:100vh; display:grid; place-items:center; padding:24px; overflow:auto; color:#fff; background:radial-gradient(circle at 50% 30%, rgba(255,140,0,.15), transparent 40%), linear-gradient(180deg, var(--bgSecondary) 0%, var(--bgPrimary) 50%, var(--bgDark) 100%); background-attachment:fixed; }
    .screen{ width:min(390px, 95vw); height:min(860px, 92vh); border-radius:44px; overflow:hidden; position:relative; background:linear-gradient(180deg, var(--bgSecondary) 0%, var(--bgPrimary) 60%, var(--bgDark) 100%); box-shadow:0 30px 80px rgba(0,0,0,.8); display:flex; flex-direction:column; align-items:center; padding:24px 16px 16px; }
    
    .header{ width:100%; display:flex; align-items:center; justify-content:space-between; padding:8px 0 16px; border-bottom:1px solid rgba(255,215,0,.2); margin-bottom:16px; }
    .btn-back{ background:var(--bgLight); border:2px solid var(--silver); color:var(--silverLight); padding:8px 16px; border-radius:12px; text-decoration:none; font-weight:700; font-size:0.85rem; display:flex; align-items:center; gap:8px; transition:0.3s; }
    .btn-back:hover{ border-color:var(--gold); transform:translateX(-3px); }
    .page-title{ font-size:1.1rem; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:1px; }
    
    .gallery{ flex:1; width:100%; overflow-y:auto; padding:8px 4px; display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; }
    .gallery::-webkit-scrollbar{width:4px;} .gallery::-webkit-scrollbar-thumb{background:var(--gold); border-radius:4px;}
    
    .gallery-item{ aspect-ratio:1; border-radius:16px; overflow:hidden; position:relative; background:var(--bgPrimary); border:2px solid rgba(255,215,0,.3); cursor:pointer; transition:transform 0.3s, opacity 0.3s; }
    .gallery-item:hover{ transform:scale(1.03); border-color:var(--gold); }
    .gallery-item img{ width:100%; height:100%; object-fit:cover; display:block; }
    
    /* Efeito de estar sendo deletado */
    .gallery-item.deleting { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }
    
    .btn-delete {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(220, 20, 60, 0.95); color: white;
      border: 2px solid white; display: none; 
      align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: 0.2s;
    }
    .btn-delete:hover { background: #ff0000; transform: scale(1.1); }
    .gallery-item.admin-mode .btn-delete { display: flex; }
    
    .gallery-empty{ grid-column:1/-1; text-align:center; padding:40px; color:var(--silver); display:flex; flex-direction:column; align-items:center; gap:10px; }
    
    .admin-toggle{ width:100%; padding:12px; text-align:center; border-top:1px solid rgba(255,215,0,.2); margin-top:auto; }
    .btn-admin{ background:transparent; border:2px dashed var(--silver); color:var(--silver); padding:8px 16px; border-radius:10px; font-weight:600; cursor:pointer; font-size:0.8rem; text-transform:uppercase; }
    .btn-admin:hover{ border-color:var(--gold); color:var(--gold); }
    
    .admin-panel{ display:none; width:100%; padding:16px; background:rgba(0,0,0,.6); border-radius:16px; border:1px solid var(--gold); margin-top:12px; animation:slideIn 0.3s; }
    .admin-panel.active{ display:block; }
    @keyframes slideIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    
    .form-group{ margin-bottom:12px; }
    .form-group label{ display:block; color:var(--goldLight); font-size:0.8rem; margin-bottom:4px; font-weight:700; }
    .form-group input, .form-group textarea{ width:100%; padding:10px; border-radius:8px; border:1px solid var(--silverDark); background:rgba(255,255,255,.1); color:#fff; font-family:inherit; }
    .form-group input:focus{ outline:none; border-color:var(--gold); }
    
    .btn-submit{ width:100%; padding:12px; background:linear-gradient(135deg, var(--gold), var(--orange)); color:#2d0f0f; font-weight:800; border:none; border-radius:8px; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:0.3s; }
    .btn-submit:hover{ transform:translateY(-2px); box-shadow:0 5px 15px rgba(255,140,0,0.4); }
    .btn-submit:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
    
    .message{ padding:10px; border-radius:6px; margin-top:10px; font-size:0.8rem; display:none; text-align:center; font-weight:600; }
    .message.success{ background:rgba(37,211,102,.2); border:1px solid #25D366; color:#afa; display:block; }
    .message.error{ background:rgba(220,20,60,.2); border:1px solid #dc143c; color:#faa; display:block; }
    .message.loading{ background:rgba(255,215,0,.2); border:1px solid var(--gold); color:var(--gold); display:block; }

    .modal{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:1000; justify-content:center; align-items:center; padding:20px; }
    .modal.active{ display:flex; animation:fadeIn 0.2s; }
    @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
    .modal img{ max-width:100%; max-height:90vh; border:2px solid var(--gold); border-radius:12px; box-shadow:0 0 30px rgba(255,215,0,0.3); }
    .modal-close{ position:absolute; top:20px; right:20px; color:#fff; font-size:2rem; cursor:pointer; background:var(--red); width:40px; height:40px; border-radius:50%; display:grid; place-items:center; }
  </style>
</head>
<body>

  <main class="screen">
    <div class="header">
      <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> VOLTAR</a>
      <div class="page-title">🔥 Promoções</div>
    </div>

    <div class="gallery" id="gallery">
      <div class="gallery-empty"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Carregando...</p></div>
    </div>

    <div class="admin-toggle">
      <button class="btn-admin" onclick="toggleAdmin()"><i class="fas fa-lock"></i> Área do Administrador</button>
    </div>

    <div class="admin-panel" id="adminPanel">
      <div id="loginSection">
        <h3 style="color:var(--gold); margin-bottom:15px; text-align:center;">Acesso Restrito</h3>
        <div class="form-group"><label>Senha:</label><input type="password" id="adminPass" placeholder="Digite a senha"></div>
        <button class="btn-submit" onclick="checkLogin()">Entrar</button>
      </div>

      <div id="uploadSection" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="color:var(--gold);">Nova Promoção</h3>
          <button onclick="logout()" style="background:none; border:none; color:var(--silver); cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
        <div class="form-group"><label>1. Foto:</label><input type="file" id="promoFile" accept="image/*"></div>
        <div class="form-group"><label>2. Título:</label><input type="text" id="promoTitle" placeholder="Ex: Promoção Relâmpago"></div>
        <button class="btn-submit" id="btnPost" onclick="postPromo()"><i class="fas fa-cloud-upload-alt"></i> Publicar</button>
        <div id="msgBox" class="message"></div>
      </div>
    </div>
  </main>

  <div class="modal" id="imgModal" onclick="this.classList.remove('active')">
    <span class="modal-close">&times;</span>
    <img id="modalImg" src="">
  </div>

  <script>
    const IMGBB_KEY = '492b2470652202fb94de6ed7a6a7c33f'; 
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysj-UnU2agy1GkcQUWtYBeSF5m-pMhbE8_CE-QyMECiXewFxS4BJWV5Tuh-0CExsJUjQ/exec';
    const MY_PASSWORD = 'performance'; 

    const gallery = document.getElementById('gallery');
    const msgBox = document.getElementById('msgBox');
    let isAdmin = false;
    let promosData = []; 

    window.onload = fetchPromos;

    async function fetchPromos() {
      try {
        // Cache busting agressivo
        const response = await fetch(SCRIPT_URL + '?t=' + Date.now());
        const data = await response.json();
        
        // Filtra apenas itens válidos
        promosData = (data || []).filter(item => item.image && String(item.image).startsWith('http'));
        
        renderGallery();
      } catch (error) {
        console.error(error);
        gallery.innerHTML = '<div class="gallery-empty">Erro ao carregar.</div>';
      }
    }

    function renderGallery() {
      if(promosData.length === 0) {
        gallery.innerHTML = '<div class="gallery-empty"><i class="fas fa-gift fa-2x"></i><p>Nenhuma promoção ativa.</p></div>';
        return;
      }

      gallery.innerHTML = promosData.map((item) => `
        <div class="gallery-item ${isAdmin ? 'admin-mode' : ''}" id="item-${item.id}" onclick="openModal('${item.image}')">
          <img src="${item.image}" loading="lazy">
          <button class="btn-delete" onclick="deletePromo(event, '${item.id}')">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      `).join('');
    }

    async function postPromo() {
      const fileInput = document.getElementById('promoFile');
      const titleInput = document.getElementById('promoTitle');
      const btn = document.getElementById('btnPost');

      if(fileInput.files.length === 0) return showMsg('Selecione uma foto.', 'error');
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
      showMsg('Enviando...', 'loading');

      try {
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('key', IMGBB_KEY);

        const imgResp = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        const imgData = await imgResp.json();
        if(!imgData.success) throw new Error('Erro ImgBB');

        const imageUrl = imgData.data.url;
        const title = titleInput.value.trim() || 'Promoção';
        const newId = Date.now().toString(); 
        
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: newId, image: imageUrl, title: title, date: new Date().toLocaleDateString() })
        });

        showMsg('Sucesso!', 'success');
        setTimeout(() => {
          fileInput.value = '';
          titleInput.value = '';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Publicar';
          fetchPromos();
        }, 1500);

      } catch (err) {
        showMsg('Erro: ' + err.message, 'error');
        btn.disabled = false;
      }
    }

    // FUNÇÃO DE EXCLUSÃO CORRIGIDA
    async function deletePromo(event, id) {
      event.stopPropagation();
      if(!confirm('Tem certeza que deseja excluir?')) return;

      const itemElement = document.getElementById(`item-${id}`);
      const btn = event.currentTarget;

      // 1. Feedback Visual Imediato (Simula exclusão)
      if(itemElement) {
        itemElement.classList.add('deleting');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      }

      try {
        // 2. Envia comando para o Google
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'delete', id: String(id) })
        });

        // 3. Aguarda 2.5 segundos para o Google processar a escrita
        await new Promise(r => setTimeout(r, 2500));

        // 4. Remove o elemento da tela permanentemente
        if(itemElement) itemElement.remove();

        // 5. Recarrega os dados em segundo plano para garantir sincronia
        fetchPromos();
        
      } catch (err) {
        console.error(err);
        alert('Erro ao conectar com o servidor. Tente novamente.');
        if(itemElement) {
          itemElement.classList.remove('deleting');
          btn.innerHTML = '<i class="fas fa-trash"></i>';
        }
      }
    }

    function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('active'); }

    function checkLogin() {
      if(document.getElementById('adminPass').value === MY_PASSWORD) {
        isAdmin = true;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('uploadSection').style.display = 'block';
        renderGallery();
      } else {
        showMsg('Senha incorreta.', 'error');
      }
    }

    function logout() {
      isAdmin = false;
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('uploadSection').style.display = 'none';
      renderGallery();
    }

    function openModal(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('imgModal').classList.add('active');
    }

    function showMsg(text, type) {
      msgBox.innerText = text;
      msgBox.className = 'message ' + type;
    }
  </script>
</body>
</html>
